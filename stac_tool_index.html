    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #111; color: #eee; }
        #sidebar { width: 420px; background: #1e1e1e; padding: 20px; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid #333; z-index: 1000; overflow-y: hidden; }

        .controls-col { display: flex; flex-direction: column; gap: 8px; background: #252525; padding: 12px; border-radius: 6px; }
        .control-row { display: flex; gap: 8px; align-items: center; }

        button.primary:disabled { background: #333; color: #666; cursor: not-allowed; }
        button.primary:not(:disabled):hover { background: #ff9033; }
        
        button.secondary { padding: 8px; background: #444; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; text-transform: uppercase; font-size: 11px;}
        button.secondary:hover { background: #555; }

        #results-header { font-size: 11px; font-weight: bold; color: #888; display: flex; justify-content: space-between; text-transform: uppercase; margin-top: 10px;}
        #tile-grid { flex: 1; overflow-y: auto; border: 1px solid #333; background: #111; border-radius: 4px; }
        
        .tile-item { padding: 12px; border-bottom: 1px solid #222; display: flex; flex-direction: column; gap: 8px; transition: background 0.1s; cursor: pointer; }
        .tile-item:hover { background: #2a2a2a; }
        .tile-item.active { background: #332200; border-left: 4px solid #ff7800; padding-left: 8px; }
        .tile-id { font-family: monospace; font-size: 13px; color: #ff7800; font-weight: bold; word-break: break-all; }
        .tile-meta { font-size: 11px; color: #aaa; }
        
        .action-buttons { display: flex; gap: 5px; }
        .action-buttons button { flex: 1; padding: 6px; font-size: 11px; background: #444; color: white; border: none; border-radius: 3px; cursor: pointer; }

        .action-buttons button.vis-btn.remove { background: #dc3545; }

        #log { height: 80px; background: #000; color: #0f0; padding: 8px; font-family: monospace; font-size: 10px; overflow-y: auto; border-top: 1px solid #333; }
        .spinner { display: inline-block; width: 10px; height: 10px; margin-right: 8px; border: 2px solid #0f0; border-radius: 50%; border-top-color: transparent; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { padding: 8px; background: #d35400; color: white; border-radius: 4px; font-size: 12px; font-weight: bold; text-align: center;}
        .ready { background: #28a745; }
    </style>

<body>

    <div id="sidebar">
        <h3>🛰️ AGIS STAC Viewer</h3>
        <div id="status" class="status">Loading Python...</div>

        <div class="controls-col">
            <div class="control-row">

            <div class="control-row hidden" id="custom-url-row">

        <div id="tile-grid">

    <div id="map"></div>

    <py-config>
        packages = ["tifffile", "numpy"]
    </py-config>

    <script type="py">
        import io
        import numpy as np
        import tifffile
        import json
        import urllib.parse
        import js
        from pyodide.http import pyfetch
        from pyscript import document, window

        def log(msg, loading=False):
            console = document.getElementById("log")
            div = document.createElement("div")
            if loading: div.innerHTML = f'<span class="spinner"></span> {msg}'
            else: div.innerText = "> " + str(msg)
            
            old = document.getElementById("active-loading")
            if old: old.remove()
            if loading: div.id = "active-loading"
            
            console.prepend(div)

        def _to_uint8_array(value):
            converted = value.to_py() if hasattr(value, "to_py") else value
            array = np.asarray(converted)
            if array.dtype != np.uint8:
                array = np.clip(array, 0, 255).astype(np.uint8)
            return array

        def python_export_geotiff(id, r, g, b, bbox_js, width_js=None, height_js=None):
            bbox = bbox_js.to_py() if hasattr(bbox_js, "to_py") else bbox_js
            width = int(width_js.to_py() if hasattr(width_js, "to_py") else width_js) if width_js is not None else None
            height = int(height_js.to_py() if hasattr(height_js, "to_py") else height_js) if height_js is not None else None

            bands = [
                _to_uint8_array(r),
                _to_uint8_array(g),
                _to_uint8_array(b),
            ]

            if width is not None and height is not None:
                bands = [band.reshape((height, width)) for band in bands]

            data = np.stack(bands, axis=0)
            if data.ndim != 3:
                raise ValueError(f"Expected 3D raster data, got shape {data.shape}")

            _, height, width = data.shape
            pixel_scale_x = (bbox[2] - bbox[0]) / width
            pixel_scale_y = (bbox[3] - bbox[1]) / height

            tags = [
                (33550, "d", 3, (pixel_scale_x, pixel_scale_y, 0.0), False),
                (33922, "d", 6, (0, 0, 0, bbox[0], bbox[3], 0.0), False),
            ]

            buf = io.BytesIO()
            tifffile.imwrite(buf, data, photometric="rgb", extratags=tags)
            window.triggerDownload(id, buf.getvalue())

        window.export_geotiff = python_export_geotiff

        async def scan_stac(event):
            params = json.loads(js.get_search_params())
            catalog_id = params["catalog"]
            collection = params["collection"]
            
            log(f"📍 Querying {catalog_id}...", loading=True)

            try:
                if catalog_id == "overture-maps":
                    response = await pyfetch("https://stac.overturemaps.org/catalog.json", method="GET")
                    await response.json()
                    mock_features = [{"id": f"overture-{collection}", "catalog": "overture", "properties": {"description": f"Global {collection} Parquet"}}]
                    js.render_grid(json.dumps(mock_features), catalog_id)
                    return

                api_url = params["custom_url"] if catalog_id == "custom" else params["api_url"]
                if not api_url.endswith("/search"):
                    api_url = api_url.rstrip("/") + "/search"
                
                bbox_str = f"{params['bbox'][0]},{params['bbox'][1]},{params['bbox'][2]},{params['bbox'][3]}"
                query_url = f"{api_url}?collections={collection}&bbox={bbox_str}&limit=20"

                if params.get("start") and params.get("end"):
                    query_url += f"&datetime={params['start']}T00:00:00Z/{params['end']}T23:59:59Z"
                
                try:
                    cloud_val = float(params.get("clouds", 100))
                except (TypeError, ValueError):
                    cloud_val = 100.0

                if cloud_val < 100:
                    cloud_query = json.dumps({"eo:cloud_cover": {"lte": cloud_val}})
                    query_url += f"&query={urllib.parse.quote(cloud_query)}"

                response = await pyfetch(query_url, method="GET")
                if not response.ok:
                    log(f"❌ API Error: {response.status}")
                    return
                    
                items = await response.json()
                log(f"🎯 Found {len(items.get('features', []))} items.")
                js.render_grid(json.dumps(items.get('features', [])), catalog_id)

            except Exception as e:
                log(f"❌ Search Error: {e}")

        # Signal Pyodide is ready
        st = document.getElementById("status")
        st.innerText = "System Ready"
        st.classList.add("ready")
        document.getElementById("btn-scan").removeAttribute("disabled")
    </script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        let SOURCE_DIRECTORY_SEED = [];
        let routeAssetUrl = (url) => url;

        const PREVIEW_OVERVIEW_LEVEL = 2;
        const PREVIEW_MIN_DIMENSION = 96;
        const PREVIEW_MAX_DIMENSION = 1024;
        const MAX_PY_EXPORT_PIXELS = 1024 * 1024;
        const FOOTPRINT_STYLE = { color: "#ff7800", weight: 1, fillOpacity: 0.05 };
        const ACTIVE_FOOTPRINT_STYLE = { color: "#ffd166", weight: 2, fillOpacity: 0.18 };

        window.map = L.map('map').setView([33.7490, -84.3880], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' }).addTo(window.map);

        const footprintLayer = L.layerGroup().addTo(window.map);
        const imageLayer = L.layerGroup().addTo(window.map);

        let stacFeatures = [];
        let layerMap = {};
        let currentSource = null;
        let activeItemId = null;
        let footprintsVisible = true;
        let renderedImages = {};
        let mpcTokens = {};
        let renderTokens = {};

        function createInlineIndexConfig() {
            const WORKER_ROUTING = {
                enabled: true,
                proxyBase: "https://agis.sweetxander.workers.dev/?url=",
                proxyApiHosts: [
                    "earth-search.aws.element84.com",
                    "planetarycomputer.microsoft.com",
                    "stac.overturemaps.org",
                ],
                proxyAssetHosts: [
                    "copernicus-dem-30m.s3.amazonaws.com",
                    "copernicus-dem-90m.s3.amazonaws.com",
                    "sentinel-cogs.s3.us-west-2.amazonaws.com",
                    "naipeuwest.blob.core.windows.net",
                    "overturemaps-us-west-2.s3.us-west-2.amazonaws.com",
                    "overturemapswestus2.blob.core.windows.net",
                    "ai4edataeuwest.blob.core.windows.net",
                    "ai4edatasetspublicassets.blob.core.windows.net",
                    "elevationeuwest.blob.core.windows.net",
                    "pcstacitems.blob.core.windows.net",
                    "usgslidareuwest.blob.core.windows.net",
                ],
            };

            const mergeProxyHosts = (...hostLists) => [...new Set(hostLists.flat().filter(Boolean))];
            const routeViaWorkerUrl = (url, options = {}) => {
                const { kind = "asset", extraHosts = [] } = options;
                if (!WORKER_ROUTING.enabled || !WORKER_ROUTING.proxyBase || !url) {
                    return url;
                }

                try {
                    const parsed = new URL(url);
                    const allowedHosts = mergeProxyHosts(
                        kind === "api" ? WORKER_ROUTING.proxyApiHosts || [] : WORKER_ROUTING.proxyAssetHosts || [],
                        extraHosts,
                    );
                    if (allowedHosts.includes(parsed.hostname)) {
                        return `${WORKER_ROUTING.proxyBase}${encodeURIComponent(url)}`;
                    }
                } catch {
                    return url;
                }

                return url;
            };

            const withWorkerRouting = (source, overrides = {}) => ({
                ...source,
                ...overrides,
                proxyBase: WORKER_ROUTING.proxyBase,
                apiProxyBase: WORKER_ROUTING.proxyBase,
                assetProxyBase: WORKER_ROUTING.proxyBase,
                proxyApiHosts: mergeProxyHosts(
                    WORKER_ROUTING.proxyApiHosts || [],
                    source.proxyApiHosts || [],
                    overrides.proxyApiHosts || [],
                ),
                proxyAssetHosts: mergeProxyHosts(
                    WORKER_ROUTING.proxyAssetHosts || [],
                    source.proxyAssetHosts || [],
                    overrides.proxyAssetHosts || [],
                ),
            });

            return {
                SOURCE_DIRECTORY_SEED: [
                    withWorkerRouting({
                        id: "earth-search",
                        label: "Earth Search",
                        sourceType: "stac-api",
                        adapterType: "stac-api",
                        enabled: true,
                        endpointOrUrl: "https://earth-search.aws.element84.com/v1",
                        endpoint: "https://earth-search.aws.element84.com/v1",
                        browserRenderable: true,
                        supportsViewportSearch: true,
                        supportsDirectRender: true,
                        supportsDownload: true,
                        defaultCollections: ["sentinel-2-l2a", "landsat-c2-l2", "naip", "sentinel-1-grd", "cop-dem-glo-30", "cop-dem-glo-90"],
                        preferredRenderableKeys: ["rendered_preview", "preview", "visual", "thumbnail", "overview", "data"],
                        cloudCoverFields: ["eo:cloud_cover"],
                        collectionPreferences: {
                            "sentinel-2-l2a": { stylePreset: "rgb", dataKind: "raster" },
                            "landsat-c2-l2": { stylePreset: "rgb", dataKind: "raster" },
                            "naip": { stylePreset: "rgb", dataKind: "raster" },
                            "sentinel-1-grd": { stylePreset: "grayscale", dataKind: "raster" },
                            "cop-dem-glo-30": { stylePreset: "dem", dataKind: "elevation" },
                            "cop-dem-glo-90": { stylePreset: "dem", dataKind: "elevation" },
                        },
                    }),
                    withWorkerRouting({
                        id: "planetary-computer",
                        label: "MS Planetary Computer",
                        sourceType: "stac-api",
                        adapterType: "stac-api",
                        enabled: true,
                        endpointOrUrl: "https://planetarycomputer.microsoft.com/api/stac/v1",
                        endpoint: "https://planetarycomputer.microsoft.com/api/stac/v1",
                        collectionsEndpoint: "https://planetarycomputer.microsoft.com/api/stac/v1/collections",
                        browserRenderable: true,
                        supportsViewportSearch: true,
                        supportsDirectRender: true,
                        supportsDownload: true,
                        defaultCollections: ["landsat-c2-l2", "sentinel-2-l2a", "cop-dem-glo-30", "cop-dem-glo-90", "3dep-seamless", "us-census"],
                        preferredRenderableKeys: ["rendered_preview", "preview", "visual", "thumbnail", "overview", "image", "data"],
                        cloudCoverFields: ["eo:cloud_cover"],
                        collectionPreferences: {
                            "landsat-c2-l2": { stylePreset: "rgb", dataKind: "raster" },
                            "sentinel-2-l2a": { stylePreset: "rgb", dataKind: "raster" },
                            "cop-dem-glo-30": { stylePreset: "dem", dataKind: "elevation" },
                            "cop-dem-glo-90": { stylePreset: "dem", dataKind: "elevation" },
                            "3dep-seamless": { stylePreset: "dem", dataKind: "elevation" },
                            "us-census": { stylePreset: "vector", dataKind: "vector" },
                        },
                    }),
                    withWorkerRouting({
                        id: "overture-maps",
                        label: "Overture Maps Foundation",
                        sourceType: "stac-catalog",
                        adapterType: "stac-static",
                        enabled: true,
                        endpointOrUrl: "https://stac.overturemaps.org/catalog.json",
                        endpoint: "https://stac.overturemaps.org/catalog.json",
                        browserRenderable: false,
                        supportsViewportSearch: false,
                        supportsDirectRender: false,
                        supportsDownload: true,
                        defaultCollections: ["buildings", "transportation", "places", "base", "addresses", "divisions"],
                        preferredRenderableKeys: ["aws", "azure", "data"],
                    }),
                ],
                routeAssetUrl: (url, extraHosts = []) => routeViaWorkerUrl(url, { kind: "asset", extraHosts }),
            };
        }

        const INLINE_INDEX1_CONFIG = createInlineIndexConfig();

        async function loadIndexConfig() {
            if (window.location.protocol === "file:") {
                SOURCE_DIRECTORY_SEED = INLINE_INDEX1_CONFIG.SOURCE_DIRECTORY_SEED || [];
                routeAssetUrl = INLINE_INDEX1_CONFIG.routeAssetUrl || routeAssetUrl;
                return;
            }

            try {
                const config = await import('./config1.js');
                SOURCE_DIRECTORY_SEED = config.SOURCE_DIRECTORY_SEED || [];
                routeAssetUrl = config.routeAssetUrl || routeAssetUrl;
                return;
            } catch (error) {
                console.error('config1.js failed to load, falling back to config.js', error);
            }

            try {
                const config = await import('./config.js');
                SOURCE_DIRECTORY_SEED = config.SOURCE_DIRECTORY_SEED || [];
                routeAssetUrl = config.routeAssetUrl || routeAssetUrl;
            } catch (error) {
                console.error('config.js fallback failed to load', error);
                SOURCE_DIRECTORY_SEED = INLINE_INDEX1_CONFIG.SOURCE_DIRECTORY_SEED || [];
                routeAssetUrl = INLINE_INDEX1_CONFIG.routeAssetUrl || routeAssetUrl;
            }
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
            }[char]));
        }

        function getItemDomId(id) {
            return `item-${encodeURIComponent(String(id))}`;
        }

        function getItemElement(id) {
            return document.getElementById(getItemDomId(id));
        }

        function getFeatureById(id) {
            return stacFeatures.find((feature) => feature.id === id) || null;
        }

        function getFeatureBounds(feature) {
            if (!feature?.bbox || feature.bbox.length < 4) {
                return null;
            }
            return [[feature.bbox[1], feature.bbox[0]], [feature.bbox[3], feature.bbox[2]]];
        }

        function getCollectionId(feature) {
            return feature?.collection || document.getElementById("collection-select").value;
        }

        function getCollectionPreferences(feature) {
            const collectionId = getCollectionId(feature);
            return currentSource?.collectionPreferences?.[collectionId] || {};
        }

        function getCollectionStylePreset(feature) {
            const configuredPreset = getCollectionPreferences(feature).stylePreset;
            if (configuredPreset) {
                return configuredPreset;
            }
            return isElevationFeature(feature) ? "dem" : "rgb";
        }

        function getCollectionDataKind(feature) {
            const collectionId = getCollectionId(feature);
            const configured = getCollectionPreferences(feature).dataKind;
            if (configured) {
                return configured;
            }
            if (/census|overture/i.test(collectionId)) {
                return "vector";
            }
            if (/cop-dem|3dep|lidar|elevation|dem/i.test(collectionId)) {
                return "elevation";
            }
            return "raster";
        }

        function isElevationFeature(feature) {
            return getCollectionDataKind(feature) === "elevation";
        }

        function isGeoTiffAsset(asset) {
            if (!asset?.href) {
                return false;
            }
            const href = asset.href.toLowerCase();
            const type = String(asset.type || "").toLowerCase();
            return href.includes(".tif") || href.includes(".tiff") || type.includes("tiff") || type.includes("geotiff");
        }

        function isPreviewImageAsset(asset) {
            if (!asset?.href) {
                return false;
            }
            const href = asset.href.toLowerCase();
            const type = String(asset.type || "").toLowerCase();
            return href.includes(".png") || href.includes(".jpg") || href.includes(".jpeg") || href.includes(".webp") || type.startsWith("image/");
        }

        function isVectorAsset(asset) {
            if (!asset?.href) {
                return false;
            }
            const href = asset.href.toLowerCase();
            const type = String(asset.type || "").toLowerCase();
            return (
                href.includes(".parquet") ||
                href.includes(".pmtiles") ||
                href.includes(".fgb") ||
                href.includes(".geojson") ||
                href.includes(".json") ||
                type.includes("parquet") ||
                type.includes("pmtiles") ||
                type.includes("geo+json") ||
                type.includes("geojson") ||
                type.includes("flatgeobuf")
            );
        }

        function getPreferredAsset(feature, preferredKeys, predicate = () => true) {
            if (!feature?.assets) {
                return null;
            }

            for (const key of preferredKeys) {
                const asset = feature.assets[key];
                if (asset?.href && predicate(asset)) {
                    return asset;
                }
            }

            return Object.values(feature.assets).find((asset) => asset?.href && predicate(asset)) || null;
        }

        function getPreviewAsset(feature) {
            return (
                getPreferredAsset(feature, ["visual", "overview", "data", "image"], isGeoTiffAsset) ||
                getPreferredAsset(feature, ["rendered_preview", "preview", "thumbnail", "visual", "image"], isPreviewImageAsset)
            );
        }

        function getDownloadAsset(feature) {
            return (
                getPreferredAsset(feature, ["data", "visual", "overview", "image"], isGeoTiffAsset) ||
                getPreferredAsset(feature, ["data", "visual", "image", "overview"])
            );
        }

        function getIntersectionBbox(feature) {
            if (!feature?.bbox || feature.bbox.length < 4) {
                return null;
            }

            const mapBounds = window.map.getBounds();
            const west = Math.max(feature.bbox[0], mapBounds.getWest());
            const south = Math.max(feature.bbox[1], mapBounds.getSouth());
            const east = Math.min(feature.bbox[2], mapBounds.getEast());
            const north = Math.min(feature.bbox[3], mapBounds.getNorth());

            if (west >= east || south >= north) {
                return null;
            }

            return [west, south, east, north];
        }

        function clampDimension(value) {
            return Math.max(PREVIEW_MIN_DIMENSION, Math.min(PREVIEW_MAX_DIMENSION, value));
        }

        function getPreviewDimensions(targetBbox) {
            const mapBounds = window.map.getBounds();
            const mapSize = window.map.getSize();
            const mapWidth = Math.max(1e-9, mapBounds.getEast() - mapBounds.getWest());
            const mapHeight = Math.max(1e-9, mapBounds.getNorth() - mapBounds.getSouth());
            const targetWidth = Math.max(1e-9, targetBbox[2] - targetBbox[0]);
            const targetHeight = Math.max(1e-9, targetBbox[3] - targetBbox[1]);

            return {
                width: clampDimension(Math.round(mapSize.x * Math.min(1, targetWidth / mapWidth))),
                height: clampDimension(Math.round(mapSize.y * Math.min(1, targetHeight / mapHeight))),
            };
        }

        function computePixelWindow(targetBbox, fullBbox, image) {
            const [fullWest, fullSouth, fullEast, fullNorth] = fullBbox;
            const width = image.getWidth();
            const height = image.getHeight();
            const spanX = Math.max(1e-9, fullEast - fullWest);
            const spanY = Math.max(1e-9, fullNorth - fullSouth);

            const x1 = Math.max(0, Math.floor(((targetBbox[0] - fullWest) / spanX) * width));
            const x2 = Math.min(width, Math.ceil(((targetBbox[2] - fullWest) / spanX) * width));
            const y1 = Math.max(0, Math.floor(((fullNorth - targetBbox[3]) / spanY) * height));
            const y2 = Math.min(height, Math.ceil(((fullNorth - targetBbox[1]) / spanY) * height));

            return [x1, y1, Math.max(x1 + 1, x2), Math.max(y1 + 1, y2)];
        }

        function getSampleIndexes(image) {
            const count = typeof image.getSamplesPerPixel === "function" ? image.getSamplesPerPixel() : 1;
            return Array.from({ length: Math.max(1, Math.min(3, count)) }, (_, index) => index);
        }

        async function readDisplayBands(image, options = {}) {
            const rasters = await image.readRasters({
                ...options,
                samples: getSampleIndexes(image),
            });
            const rasterList = Array.isArray(rasters) ? rasters : [rasters];
            return {
                r: rasterList[0],
                g: rasterList[1] || rasterList[0],
                b: rasterList[2] || rasterList[1] || rasterList[0],
            };
        }

        function getStretchMax(bands) {
            if (currentSource?.id === "earth-search") {
                return 3500;
            }

            let maxValue = 0;
            [bands.r, bands.g, bands.b].forEach((band) => {
                for (let index = 0; index < band.length; index += 1) {
                    const value = band[index];
                    if (Number.isFinite(value)) {
                        maxValue = Math.max(maxValue, value);
                    }
                }
            });

            return maxValue > 0 ? maxValue : 255;
        }

        function getBandRange(band) {
            let minValue = Number.POSITIVE_INFINITY;
            let maxValue = Number.NEGATIVE_INFINITY;

            for (let index = 0; index < band.length; index += 1) {
                const value = band[index];
                if (Number.isFinite(value)) {
                    minValue = Math.min(minValue, value);
                    maxValue = Math.max(maxValue, value);
                }
            }

            if (!Number.isFinite(minValue) || !Number.isFinite(maxValue)) {
                return { min: 0, max: 255 };
            }

            return { min: minValue, max: maxValue };
        }

        function toByteBands(bands, maxValue = getStretchMax(bands)) {
            const convert = (band) => {
                const output = new Uint8Array(band.length);
                for (let index = 0; index < band.length; index += 1) {
                    const value = Number.isFinite(band[index]) ? band[index] : 0;
                    output[index] = Math.max(0, Math.min(255, Math.round((value / maxValue) * 255)));
                }
                return output;
            };

            return {
                r: convert(bands.r),
                g: convert(bands.g),
                b: convert(bands.b),
            };
        }

        function toGrayscaleByteBands(band) {
            const { min, max } = getBandRange(band);
            const range = Math.max(1, max - min);
            const output = new Uint8Array(band.length);

            for (let index = 0; index < band.length; index += 1) {
                const value = Number.isFinite(band[index]) ? band[index] : min;
                output[index] = Math.max(0, Math.min(255, Math.round(((value - min) / range) * 255)));
            }

            return { r: output, g: output, b: output };
        }

        function shouldRenderAsGrayscale(bands, preset) {
            return preset === "dem" || preset === "grayscale" || (bands.r === bands.g && bands.r === bands.b);
        }

        function getDisplayByteBands(bands, feature) {
            const preset = getCollectionStylePreset(feature);
            if (shouldRenderAsGrayscale(bands, preset)) {
                return toGrayscaleByteBands(bands.r);
            }
            return toByteBands(bands);
        }

        function buildCanvasFromBands(bands, width, height, feature) {
            const byteBands = getDisplayByteBands(bands, feature);
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;

            const context = canvas.getContext("2d");
            const imageData = context.createImageData(width, height);

            for (let index = 0; index < byteBands.r.length; index += 1) {
                const offset = index * 4;
                imageData.data[offset] = byteBands.r[index];
                imageData.data[offset + 1] = byteBands.g[index];
                imageData.data[offset + 2] = byteBands.b[index];
                imageData.data[offset + 3] = 255;
            }

            context.putImageData(imageData, 0, 0);
            return canvas;
        }

        async function resolveAssetUrl(asset, feature) {
            if (!asset?.href) {
                return null;
            }

            let assetUrl = asset.href;
            if (assetUrl.startsWith('s3://')) {
                const parts = assetUrl.replace('s3://', '').split('/');
                assetUrl = `https://${parts.shift()}.s3.us-west-2.amazonaws.com/${parts.join('/')}`;
            }

            if (assetUrl.includes('.blob.core.windows.net') && !/[?&](sig|se)=/i.test(assetUrl)) {
                const collectionId = getCollectionId(feature);
                if (!mpcTokens[collectionId]) {
                    const response = await fetch(`https://planetarycomputer.microsoft.com/api/sas/v1/token/${collectionId}`);
                    mpcTokens[collectionId] = (await response.json()).token;
                }
                assetUrl += assetUrl.includes('?') ? `&${mpcTokens[collectionId]}` : `?${mpcTokens[collectionId]}`;
            }

            return routeAssetUrl(assetUrl, currentSource?.proxyAssetHosts || []);
        }

        async function createPreviewOverlay(feature, assetUrl) {
            const tiff = await GeoTIFF.fromUrl(assetUrl);
            const imageCount = await tiff.getImageCount();
            const previewIndex = Math.min(PREVIEW_OVERVIEW_LEVEL, Math.max(0, imageCount - 1));
            const previewImage = await tiff.getImage(previewIndex);
            const previewBbox = getIntersectionBbox(feature) || feature.bbox;
            const previewWindow = computePixelWindow(previewBbox, feature.bbox, previewImage);
            const { width, height } = getPreviewDimensions(previewBbox);
            const bands = await readDisplayBands(previewImage, {
                window: previewWindow,
                width,
                height,
            });

            return {
                canvas: buildCanvasFromBands(bands, width, height, feature),
                overlayBounds: [[previewBbox[1], previewBbox[0]], [previewBbox[3], previewBbox[2]]],
            };
        }

        async function inspectGeoTiff(assetUrl) {
            const tiff = await GeoTIFF.fromUrl(assetUrl);
            const baseImage = await tiff.getImage(0);
            return {
                width: baseImage.getWidth(),
                height: baseImage.getHeight(),
                samplesPerPixel: typeof baseImage.getSamplesPerPixel === "function" ? baseImage.getSamplesPerPixel() : 1,
            };
        }

        async function loadFullResolutionBands(assetUrl) {
            const tiff = await GeoTIFF.fromUrl(assetUrl);
            const baseImage = await tiff.getImage(0);
            const bands = await readDisplayBands(baseImage);
            return {
                ...toByteBands(bands),

        window.renderCOG_legacy = async function(id) {
            const feature = stacFeatures.find(f => f.id === id);

                imageLayer.removeLayer(renderedImages[id]);

                return;
            }

            let assetUrl = feature.assets.visual?.href || feature.assets.data?.href || feature.assets.image?.href;
            if (!assetUrl) { alert("No compatible asset found."); return; }

            if (assetUrl.startsWith("s3://")) {
                const p = assetUrl.replace("s3://", "").split("/");
                assetUrl = `https://${p.shift()}.s3.us-west-2.amazonaws.com/${p.join("/")}`;
            }

            try {
                btn.innerText = "⏳ Loading...";
                if (assetUrl.includes('.blob.core.windows.net')) {
                    const col = feature.collection || document.getElementById("collection-select").value;
                    if (!mpcTokens[col]) {
                        const res = await fetch(`https://planetarycomputer.microsoft.com/api/sas/v1/token/${col}`);
                        mpcTokens[col] = (await res.json()).token;
                    }
                    assetUrl += `?${mpcTokens[col]}`;
                }

                const tiff = await GeoTIFF.fromUrl(routeAssetUrl(assetUrl));
                const image = await tiff.getImage();
                const rasters = await image.readRasters({ width: 512, height: 512 });
                
                // 🚀 CACHE BANDS FOR EXPORT
                rasterCache[id] = { r: rasters[0], g: rasters[1], b: rasters[2] || rasters[0] };

                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d');
                const imgData = ctx.createImageData(512, 512);
                
                for (let i = 0; i < rasters[0].length; i++) {
                    const idx = i * 4;
                    const max = (currentSource.id === 'earth-search') ? 3500 : 255;
                    imgData.data[idx] = Math.min((rasters[0][i] / max) * 255, 255);
                    imgData.data[idx+1] = Math.min((rasters[1][i] / max) * 255, 255);
                    imgData.data[idx+2] = Math.min(((rasters[2] ? rasters[2][i] : rasters[0][i]) / max) * 255, 255);
                    imgData.data[idx+3] = 255;
                }
                ctx.putImageData(imgData, 0, 0);
                
                const bounds = [[feature.bbox[1], feature.bbox[0]], [feature.bbox[3], feature.bbox[2]]];
                renderedImages[id] = L.imageOverlay(canvas.toDataURL(), bounds).addTo(imageLayer);
                btn.innerText = "🗑️ Remove"; btn.classList.add("remove");

                return;
            }

            const asset = getDownloadAsset(feature);
            if (!asset) {
                button.innerText = "No asset";

                    button.innerText = "DL";
                }, 1600);
                return;
            }

            const originalText = button.innerText;
            button.disabled = true;

            window.setActiveItem(id, false);

            try {
                const assetUrl = await resolveAssetUrl(asset, feature);
                if (!assetUrl) {
                    throw new Error("No compatible asset found.");
                }

                if (isGeoTiffAsset(asset)) {
                    const filename = getAssetFilename(asset, id, ".tif");
                    let assetInfo = null;

                    try {
                        assetInfo = await inspectGeoTiff(assetUrl);
                    } catch (inspectError) {
                        console.warn("GeoTIFF metadata inspection failed, falling back to direct download.", inspectError);
                    }

                    const shouldDirectDownload =
                        isElevationFeature(feature) ||
                        getCollectionStylePreset(feature) !== "rgb" ||
                        !assetInfo ||
                        assetInfo.samplesPerPixel < 3 ||
                        (assetInfo.width * assetInfo.height) > MAX_PY_EXPORT_PIXELS ||
                        typeof window.export_geotiff !== "function";

                    if (shouldDirectDownload) {
                        triggerAssetDownload(assetUrl, filename);
                    } else {
                        try {

                            window.export_geotiff(
                                id,
                                fullResBands.r,
                                fullResBands.g,
                                fullResBands.b,
                                feature.bbox,
                                fullResBands.width,
                                fullResBands.height,
                            );
                        } catch (exportError) {
                            console.warn("Browser-side GeoTIFF export failed, falling back to source asset download.", exportError);
                            triggerAssetDownload(assetUrl, filename);
                        }
                    }
                } else {
                    await window.openAsset(id);
                }

                button.innerText = "Saved";
                window.setTimeout(() => {
                    button.innerText = originalText;
                    button.disabled = false;
                }, 1200);
            } catch (error) {

            const feature = getFeatureById(id);
            const itemEl = getItemElement(id);
            const button = itemEl?.querySelector(".vis-btn");
            if (!feature || !button) {
                return;
            }

            if (renderedImages[id]) {
                invalidateRender(id);
                imageLayer.removeLayer(renderedImages[id]);
                delete renderedImages[id];
                button.innerText = "Visualize";
                button.classList.remove("remove");
                return;
            }

            const previewAsset = getPreviewAsset(feature);
            if (!previewAsset) {
                const downloadAsset = getDownloadAsset(feature);
                if (downloadAsset && isVectorAsset(downloadAsset)) {
                    await window.openAsset(id);
                    return;
                }

                button.innerText = "No preview";
                window.setTimeout(() => {
                    button.innerText = "Visualize";
                }, 1600);
                return;
            }

            const requestToken = invalidateRender(id);
            button.disabled = true;
            button.innerText = "Loading...";
            window.setActiveItem(id, false);

            try {
                const assetUrl = await resolveAssetUrl(previewAsset, feature);
                if (!assetUrl) {
                    throw new Error("No compatible asset found.");
                }

                let overlay;
                if (isGeoTiffAsset(previewAsset)) {
                    const preview = await createPreviewOverlay(feature, assetUrl);
                    if (renderTokens[id] !== requestToken) {
                        return;
                    }
                    overlay = L.imageOverlay(preview.canvas.toDataURL(), preview.overlayBounds).addTo(imageLayer);
                } else {
                    const bounds = getFeatureBounds(feature);
                    if (!bounds) {
                        throw new Error("Feature has no bounds.");
                    }
                    overlay = L.imageOverlay(assetUrl, bounds).addTo(imageLayer);
                }

                renderedImages[id] = overlay;
                button.innerText = "Remove";
                button.classList.add("remove");
            } catch (error) {
                console.error(error);
                button.innerText = "Error";
                window.setTimeout(() => {
                    if (!renderedImages[id]) {
                        button.innerText = "Visualize";
                        button.classList.remove("remove");
                    }
                }, 1600);
            } finally {
                button.disabled = false;
            }
        };

        document.querySelector("#sidebar h3").innerText = "AGIS STAC Viewer";
        document.getElementById("btn-scan").innerText = "Query Area in View";
        document.getElementById("btn-toggle-footprints").innerText = "Hide Footprints";
        document.querySelector(".control-row button.secondary").innerText = "Clear";

        await loadIndexConfig();
        initUI();
    </script>
</body>
</html>
